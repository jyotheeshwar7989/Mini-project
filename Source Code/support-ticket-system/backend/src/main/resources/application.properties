# Application
spring.application.name=support-ticket-system
server.port=8080

# Database - uses environment variables in Docker
# Falls back to local values for development
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/support_ticket_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Jyothish@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${APP_JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# Logging
logging.level.root=INFO
logging.level.com.supportticket=INFO

# DevTools
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false