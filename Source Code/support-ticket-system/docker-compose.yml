

services:

  # ================================
  # MySQL Database
  # ================================
  mysql:
    image: mysql:8.0
    container_name: support_ticket_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Jyothish@123
      MYSQL_DATABASE: support_ticket_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - support_ticket_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping",
             "-h", "localhost",
             "-u", "root",
             "-proot1234"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ================================
  # Spring Boot Backend
  # ================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: support_ticket_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/support_ticket_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Jyothish@123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_JWT_SECRET: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
      APP_JWT_EXPIRATION: 86400000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - support_ticket_network

  # ================================
  # React Frontend
  # ================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: support_ticket_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - support_ticket_network

# ================================
# Networks
# ================================
networks:
  support_ticket_network:
    driver: bridge

# ================================
# Volumes
# ================================
volumes:
  mysql_data:
    driver: local